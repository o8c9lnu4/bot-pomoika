services:
  - type: web
    name: pomoika-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      cd admin && python manage.py migrate
      cd admin && python manage.py collectstatic --noinput
    startCommand: cd admin && python manage.py runserver 0.0.0.0:$PORT
    envVars:
      - key: BOT_TOKEN
        value: 8331513788:AAEqlTi3fAq7dGXjIOpD3tHyxKoo5ZFdW5M
      - key: ADMIN_IDS
        value: 1416114363
      - key: DJANGO_SECRET_KEY
        value: your-secret-key-change-in-production
      - key: DJANGO_DEBUG
        value: "False"
